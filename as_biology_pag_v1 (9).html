// Step 3: findBestTemplate — picks the template with most overlap with weak criteria
function findBestTemplate(pagId, weakCriteria, preferType) {
  const candidates = QUESTION_TEMPLATES.filter(t => t.pag === pagId);
  if(!candidates.length) return null;
  // Filter by preferred type if specified and candidates exist for it
  const typed = preferType ? candidates.filter(t => t.type === preferType) : candidates;
  const pool = typed.length ? typed : candidates;
  let best = null, bestScore = -1;
  pool.forEach(t => {
    const overlap = t.targets.filter(x => weakCriteria.includes(x)).length;
    if(overlap > bestScore) { bestScore = overlap; best = t; }
  });
  return best || pool[0];
}

// Step 3: generateQuestion — injects a random context variant into the stem
function generateQuestion(template, weakCriteria, avgSuccess) {
  const context = template.context_variants[
    Math.floor(Math.random() * template.context_variants.length)
  ];
  const question = template.question_stem.replace('[context]', context);
  // Step 5: scaffolding threshold logic
  let scaffold = null;
  if(avgSuccess < 0.4) {
    scaffold = buildScaffold(template.type);
  }
  return {
    templateId: template.id,
    type: template.type,
    marks: template.marks,
    targets: template.targets,
    question_text: question,
    focus: weakCriteria.length ? weakCriteria : null,
    scaffold
  };
}

// Step 5: Sentence-frame scaffold for low performers
function buildScaffold(type) {
  if(type === 'evaluation') {
    return [
      "A limitation of this method is ______.",
      "This affects the results because ______.",
      "This could be improved by ______.",
      "This improvement would reduce the problem because ______."
    ];
  }
  if(type === 'design') {
    return [
      "The independent variable is ______.",
      "The dependent variable is measured by ______.",
      "Control variables include ______ (controlled by ______).",
      "The method involves: ______.",
      "To improve reliability, I would ______."
    ];
  }
  return null;
}

// Compute average success rate across all attempted criteria for a PAG
function avgCriterionSuccess(pagId) {
  const criteria = (S.sessionScores[pagId]||{}).criteria;
  if(!criteria) return null;
  const vals = Object.values(criteria);
  if(!vals.length) return null;
  return vals.reduce((s,c) => s + c.successes/c.attempts, 0) / vals.length;
}

// Fisher-Yates shuffle — returns a new shuffled array, does not mutate original
function shuffle(arr) {
  const a = arr.slice();
  for(let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// Build shuffled options for all blanks of a card
function buildShuffledOptions(card) {
  return card.options.map(optGroup => shuffle(optGroup));
}

  return n?Math.round(t/n):0;
}

// Returns array of criterion IDs ordered worst-first.
// Unseen criteria (null rate) are treated as 0 so they get prioritised.
function selectNextCriteria(pagId, n) {
  n = n || 2;
  const pag = DATA.pags.find(p => p.id === pagId);
  if(!pag) return [];
  // Gather all criterion IDs from all mark schemes that exist
  const allCriteria = [];
  ['design','data','evaluation'].forEach(type => {
    const ms = pag.mark_scheme[type];
    if(ms && ms.criteria) {
      ms.criteria.forEach(c => {
        if(!allCriteria.find(x => x.id === c.id)) {
          const rate = getCriterionRate(pagId, c.id);
          allCriteria.push({ id: c.id, rate: rate === null ? 0 : rate });
        }
      });
    }
  });
  // Sort ascending by success rate — weakest first
  allCriteria.sort((a,b) => a.rate - b.rate);
  return allCriteria.slice(0, n).map(c => c.id);
}
function updateScore(id,key,val){ if(!S.sessionScores[id])S.sessionScores[id]={}; S.sessionScores[id][key]=val; saveProgress(S.sessionScores); }

// Step 1: Per-criterion progress tracking.
// For each criterion in a breakdown, record attempts and successes.
// progressMap shape: { pag_id: { criterion_id: { attempts, successes } } }
function updateCriterionProgress(pagId, breakdown) {
  if(!S.sessionScores[pagId]) S.sessionScores[pagId] = {};
  if(!S.sessionScores[pagId].criteria) S.sessionScores[pagId].criteria = {};
  breakdown.forEach(c => {
    const prev = S.sessionScores[pagId].criteria[c.id] || { attempts:0, successes:0 };
    S.sessionScores[pagId].criteria[c.id] = {
      attempts: prev.attempts + 1,
      successes: prev.successes + (c.achieved ? 1 : 0)
    };
  });
  saveProgress(S.sessionScores);
}

// Returns criterion success rate (0–1) for a given pag+criterion, or null if unseen.
function getCriterionRate(pagId, criterionId) {
  const c = (S.sessionScores[pagId]||{}).criteria;
  if(!c || !c[criterionId]) return null;
  return c[criterionId].successes / c[criterionId].attempts;
}

function renderSentence(){
  const pag=DATA.pags.find(p=>p.id===S.selectedPag);
  const cards=SB_DATA[pag.id]||[];
  if(!cards.length){S.view='detail';render();return '';}
  if(S.sbDone){
    const correct=Object.values(S.sb.scores).filter(Boolean).length;
    const pct=Math.round((correct/cards.length)*100);
    return `${hdr('Sentence Builder',pag.title,true)}
      <div class="content">
        <div class="fc-summary">
          <div class="fc-summary-mode">Sentence Builder</div>
          <div class="fc-summary-score">${correct}/${cards.length}</div>
          <div class="fc-summary-label">${pct}% correct</div>
        </div>
        <button class="cta-btn" data-action="startApply">Try Exam Question →</button>
        <button class="cta-btn cta-btn-outline" style="margin-top:8px;" data-action="retrySentence">Retry Sentence Builder</button>
        <button class="cta-btn cta-btn-outline" style="margin-top:8px;" data-action="goBack">Back to PAG</button>
      </div>${nav()}`;
  }
  const idx=S.sb.index;
  const card=cards[idx];
  const answered=S.sb.answered;
  const selected=S.sb.selected;
  const dots=cards.map((_,i)=>`<div class="sb-dot ${i<idx?'done':i===idx?'current':''}"></div>`).join('');

  const parts=card.sentence.split('___');
  let sentenceHtml='<div class="sb-parts">';
  parts.forEach((part,pi)=>{
    const isLast=pi===parts.length-1;
    const sel=selected&&selected[pi];
    let blankCls='sb-blank';
    if(sel&&answered) blankCls+=sel.toLowerCase()===card.blanks[pi].toLowerCase()?' correct':' incorrect';
    else if(sel) blankCls+=' filled';
    const display=sel||('Blank '+(pi+1));
    // Strip leading punctuation/spaces from this part to append after previous blank,
    // and strip trailing spaces so punctuation sits tight against the blank that follows.
    // Each row: [text from this part] [blank] [leading punct of next part on same line]
    // Strip leading punctuation from this part if it was already rendered
    // after the previous blank (pi > 0 and prev part had trailing punct peeked).
    const prevPunct = pi > 0 ? (parts[pi-1+1] && parts[pi].match(/^([.,;:—…]+)/) ? parts[pi].match(/^([.,;:—…]+)/)[1] : '') : '';
    const thisText = pi > 0 ? part.replace(/^[.,;:—…]+/, '').trim() : part.trim();
    // Peek at the next part: any leading punctuation (.,;:) should appear on THIS row
    // immediately after the blank, not as the start of the next row.
    const nextPart = !isLast ? parts[pi+1] : '';
    const leadMatch = nextPart.match(/^([.,;:—…]+)/);
    const trailingPunct = leadMatch ? leadMatch[1] : '';
    sentenceHtml+='<div class="sb-part-row">';
    if(thisText) sentenceHtml+='<span class="sb-part-text">'+thisText+'</span>';
    if(!isLast){
      sentenceHtml+='<span class="'+blankCls+'" data-blank="'+pi+'">'+display+'</span>';
      if(trailingPunct) sentenceHtml+='<span class="sb-part-text">'+trailingPunct+'</span>';
    }
    sentenceHtml+='</div>';
  });
  // Strip the leading punctuation we already rendered from each part before displaying it
  // (handled above by only trim()ing — parts already split cleanly on ___)
  sentenceHtml+='</div>';

  const currentBlank=selected?selected.findIndex(s=>!s):0;
  const blankToFill=answered?-1:(currentBlank===-1?-1:currentBlank);
  let optionsHtml='';
  // Use pre-shuffled options (shuffled once on card init, stable within attempt)
  const optionsForBlank = (S.sb.shuffledOptions && S.sb.shuffledOptions[idx])
    ? S.sb.shuffledOptions[idx][blankToFill]
    : (card.options[blankToFill] ? shuffle(card.options[blankToFill]) : []);

  if(blankToFill>=0&&optionsForBlank.length){
    optionsHtml=`<div style="font-size:12px;font-weight:700;color:var(--text2);margin-bottom:10px;font-family:var(--ui-font);">
        Choose the word for <span style="color:var(--practical);">Blank ${blankToFill+1}</span>:
      </div>
      <div class="sb-options">
        ${optionsForBlank.map(opt=>{
          let cls='sb-option';
          if(answered&&selected[blankToFill]){
            if(opt.toLowerCase()===card.blanks[blankToFill].toLowerCase()) cls+=' correct-opt';
            else if(opt===selected[blankToFill]) cls+=' wrong-opt';
          }
          return `<button class="${cls}" data-action="sbSelect" data-blank="${blankToFill}" data-opt="${opt}">${opt}</button>`;
        }).join('')}
      </div>`;
  }

  let feedbackHtml='';
  if(answered){
    const allCorrect=card.blanks.every((b,i)=>selected[i]&&selected[i].toLowerCase()===b.toLowerCase());
    feedbackHtml=`<div class="sb-feedback show ${allCorrect?'correct':'incorrect'}">
      ${allCorrect?'✓ Correct! Well done.':`✗ The correct answers were: <em>${card.blanks.join(', ')}</em>`}
    </div>`;
  }

  return `${hdr(pag.title,`Sentence ${idx+1} of ${cards.length}`,true)}
    <div class="content">
      <div class="sb-progress">${dots}</div>
      <div class="sb-card">
        <div class="sb-label">Complete the sentence</div>
        ${sentenceHtml}
        ${optionsHtml}
        ${feedbackHtml}
      </div>
      ${answered?`<button class="cta-btn" data-action="sbNext">${idx+1<cards.length?'Next sentence →':'See results →'}</button>`:''}
    </div>${nav()}`;
}

// ── APPLY ────────────────────────────────

// ═══════════════════════════════════════════
//  APPLY RENDERING — clean flat string concat
//  No template literals. No nested functions.
//  All helpers are top-level, all HTML built
//  with + concatenation only.
// ═══════════════════════════════════════════

// ── Helpers ──────────────────────────────────

function buildScaffoldHtml(scaffold) {
  if (!scaffold || !scaffold.length) return '';
  var inner = scaffold.map(function(s) {
    return '<div style="font-size:13px;color:var(--text2);padding:4px 0;border-bottom:1px solid var(--border-light);">' + s + '</div>';
  }).join('');
  return '<div style="background:var(--surface2);border:1px solid var(--border-light);border-radius:var(--radius-sm);padding:13px;margin-bottom:10px;">' +
    '<div style="font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:8px;font-family:var(--ui-font);">\uD83D\uDCAC Answer scaffold</div>' +
    inner + '</div>';
}

function buildFocusHtml(focus) {
  if (!focus || !focus.length) return '';
  var terms = focus.map(function(f) { return f.replace(/_/g, ' '); }).join(', ');
  return '<div style="background:var(--warn-bg);border:1px solid #E8C46A;border-radius:var(--radius-sm);padding:11px 14px;margin-bottom:10px;">' +
    '<div style="font-size:10px;font-weight:700;color:var(--warn);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:5px;font-family:var(--ui-font);">\uD83C\uDFAF Focus areas for you</div>' +
    '<div style="font-size:13px;color:var(--warn);line-height:1.6;">Based on your previous answers, focus on: <strong>' + terms + '</strong></div>' +
    '</div>';
}

function buildCoachPanel(coachSteps) {
  var strPct = Math.round(structureScore(coachSteps) * 100);
  var neededSteps = coachSteps.filter(function(s) { return s.needed; });

  var stepsHtml = coachSteps.map(function(s) {
    var cls  = s.needed ? 'needed' : 'done';
    var icon = s.needed ? '!' : '\u2713';
    var starter = s.needed
      ? '<div class="coach-starter">' + s.sentence_starter + '</div>'
      : '';
    return '<div class="coach-step ' + cls + '">' +
      '<div class="coach-step-header">' +
        '<div class="coach-step-icon ' + cls + '">' + icon + '</div>' +
        '<div class="coach-step-desc">' + s.description + '</div>' +
      '</div>' + starter + '</div>';
  }).join('');

  var improveSection = neededSteps.length > 0
    ? '<div class="improve-section">' +
        '<div class="improve-label">Improve your answer</div>' +
        '<div class="improve-hint">Add the missing parts below — your original answer is kept and the combined text will be re-marked.</div>' +
        '<textarea id="improveTA" style="min-height:120px;" placeholder="Write your additions here\u2026">' + (S.improveText || '') + '</textarea>' +
        '<button class="cta-btn" style="margin-top:8px;" data-action="submitImprovement">Re-mark with additions \u2192</button>' +
      '</div>'
    : '';

  return '<div class="coach-panel">' +
    '<div class="coach-title">Answer structure coach</div>' +
    '<div class="structure-bar">' +
      '<div class="structure-bar-label">Structure</div>' +
      '<div class="structure-bar-track"><div class="structure-bar-fill" style="width:' + strPct + '%"></div></div>' +
      '<div class="structure-bar-pct">' + strPct + '%</div>' +
    '</div>' +
    stepsHtml + improveSection +
  '</div>';
}

function buildQuestionSelectorHtml(pag) {
  var qs = pag.questions.filter(function(q) {
    return pag.mark_scheme[q.type] !== null && pag.mark_scheme[q.type] !== undefined;
  });
  var btns = qs.map(function(q) {
    return '<button class="q-select-btn" data-action="selectQuestion" data-qid="' + q.id + '">' +
      '<div style="display:flex;align-items:center;gap:8px;margin-bottom:5px;">' +
        '<span class="mark-q-type ' + q.type + '">' + q.type + '</span>' +
        '<span style="font-size:11px;font-weight:700;color:var(--text3);font-family:var(--ui-font);">[' + q.marks + ' marks]</span>' +
      '</div>' +
      '<div class="q-select-preview">' + q.question_text.substring(0, 90) + '\u2026</div>' +
    '</button>';
  }).join('');
  return '<div class="section-label">Choose a question</div><div class="q-selector">' + btns + '</div>';
}

function buildResultHtml(pag, result, q) {
  var g = grade(result.score, result.max_score);

  var feedbackHtml = result.feedback.map(function(f) {
    var pass = f.charAt(0) === '\u2713';
    var text = f.replace(/^[\u2713\u2717]\s*/, '');
    return '<div class="feedback-item">' +
      '<div class="feedback-tick ' + (pass ? 'pass' : 'fail') + '">' + (pass ? '\u2713' : '\u2717') + '</div>' +
      '<div>' + text + '</div>' +
    '</div>';
  }).join('');

  var nextHtml = result.next_steps && result.next_steps.length
    ? '<div class="next-steps-box"><div class="next-steps-title">To improve your answer:</div>' +
      result.next_steps.map(function(n) {
        return '<div class="next-step-item">' + n + '</div>';
      }).join('') + '</div>'
    : '';

  var coachHtml = S.coachSteps && S.coachSteps.some(function(s) { return s.needed; })
    ? buildCoachPanel(S.coachSteps)
    : '';

  return hdr('Your Result', pag.title, true) +
    '<div class="content">' +
      '<div class="score-panel">' +
        '<div class="score-header">' +
          '<div><div class="score-big">' + result.score + '<span class="score-denom">/' + result.max_score + '</span></div></div>' +
          '<div class="score-right">' +
            '<div class="score-grade">' + g.label + '</div>' +
            '<div class="score-breakdown-mini">' + Math.round((result.score / result.max_score) * 100) + '% of available marks</div>' +
          '</div>' +
        '</div>' +
        '<div class="score-body">' +
          '<div class="feedback-section"><div class="feedback-title">Mark scheme criteria</div>' + feedbackHtml + '</div>' +
          nextHtml +
        '</div>' +
      '</div>' +
      coachHtml +
      '<button class="cta-btn" data-action="tryAgain">Try again</button>' +
      '<button class="cta-btn cta-btn-outline" style="margin-top:8px;" data-action="goBack">Back to PAG</button>' +
    '</div>' + nav();
}

function buildQuestionHtml(pag, q) {
  var typeLabels = { design: 'Design', data: 'Data & Calculation', evaluation: 'Evaluate & Improve' };
  var hints = {
    design: 'Describe what you would do step by step. State the IV, DV, and control variables. Include repeats and how to make results reliable.',
    data: 'Show all working clearly. State the formula, substitute values, calculate the answer and include units.',
    evaluation: 'Identify specific limitations, explain their impact on results, then suggest realistic improvements. Link each improvement to a limitation.'
  };

  var hintHtml = hints[q.type]
    ? '<div class="exam-hint">' + hints[q.type] + '</div>'
    : '';

  var focusHtml   = buildFocusHtml(q.focus);
  var scaffoldHtml = buildScaffoldHtml(q.scaffold);

  var adaptiveBadge = q.templateId
    ? '<span style="font-size:10px;font-weight:600;color:var(--text3);font-family:var(--ui-font);margin-left:8px;">adaptive</span>'
    : '';

  return hdr('Exam Question', pag.title, true) +
    '<div class="content">' +
      hintHtml +
      focusHtml +
      '<div class="mark-question">' +
        '<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;">' +
          '<span class="mark-q-type ' + q.type + '">' + (typeLabels[q.type] || q.type) + '</span>' +
          adaptiveBadge +
        '</div>' +
        '<div class="mark-q-text">' + q.question_text + '</div>' +
        '<div class="mark-q-marks">[' + q.marks + ' marks]</div>' +
      '</div>' +
      scaffoldHtml +
      '<textarea id="applyTA" placeholder="Write your answer here\u2026">' + (S.applyAnswer || '') + '</textarea>' +
      '<div class="char-count" id="charCount">' + (S.applyAnswer || '').length + ' characters</div>' +
      '<button class="cta-btn" style="margin-top:8px;" data-action="submitAnswer">Mark My Answer \u2192</button>' +
      '<button class="cta-btn cta-btn-outline" style="margin-top:8px;" data-action="newAdaptiveQuestion">Get a different question</button>' +
    '</div>' + nav();
}

// ── Main render function ──────────────────────

function renderApply() {
  var pag    = DATA.pags.find(function(p) { return p.id === S.selectedPag; });
  var result = S.applyScore;

  // 1. Show result view if answer has been marked
  if (result) {
    var q = S.adaptiveQuestion || pag.questions.find(function(q) { return q.id === S.selectedQuestion; }) || {};
    return buildResultHtml(pag, result, q);
  }

  // 2. Generate adaptive question if none selected yet
  if (!S.selectedQuestion && !S.adaptiveQuestion) {
    var hasTemplates = QUESTION_TEMPLATES.some(function(t) { return t.pag === pag.id; });
    if (hasTemplates) {
      var weak     = selectNextCriteria(pag.id, 2);
      var template = findBestTemplate(pag.id, weak, null);
      if (template) {
        var avg = avgCriterionSuccess(pag.id);
        S.adaptiveQuestion = generateQuestion(template, weak, avg !== null ? avg : 0.5);
      }
    }
    // If still no adaptive question, show static selector
    if (!S.adaptiveQuestion) {
      return hdr('Exam Question Practice', pag.title, true) +
        '<div class="content">' +
          '<div class="exam-hint"><strong>\uD83D\uDCA1 AS tip:</strong> Read the command word carefully — "describe" wants a method, "explain" wants the science behind it, "evaluate" wants limitations and improvements. Always include control variables and how they are controlled.</div>' +
          buildQuestionSelectorHtml(pag) +
        '</div>' + nav();
    }
  }

  // 3. Show question
  var q = S.adaptiveQuestion || pag.questions.find(function(q) { return q.id === S.selectedQuestion; });
  if (!q) {
    return hdr('Exam Question Practice', pag.title, true) +
      '<div class="content">' + buildQuestionSelectorHtml(pag) + '</div>' + nav();
  }
  return buildQuestionHtml(pag, q);
}




// ── RESULTS ──────────────────────────────
function renderResults(){
  const scored=DATA.pags.filter(p=>S.sessionScores[p.id]);
  const wa=weakAreas();
  const cardsHtml=scored.length===0
    ?`<div class="empty-state"><div class="empty-icon">📊</div><div class="empty-text">No results yet.<br>Complete some practice to see your progress here.</div></div>`
    :scored.map(pag=>{
        const m=mastery(pag.id);
        const s=S.sessionScores[pag.id];
        return `<div class="results-card">
          <div class="results-pag-name">${pag.title}</div>
          <div class="mastery-label"><span>Overall mastery</span><span>${m}%</span></div>
          <div class="mastery-bar"><div class="mastery-fill" style="width:${m}%"></div></div>
          <div class="results-scores">
            ${s.fc!==undefined?`<div class="results-score-chip"><div class="results-score-chip-label">Cards</div><div class="results-score-chip-val">${Math.round(s.fc)}%</div></div>`:''}
            ${s.sb!==undefined?`<div class="results-score-chip"><div class="results-score-chip-label">Sentences</div><div class="results-score-chip-val">${Math.round(s.sb)}%</div></div>`:''}
            ${s.apply!==undefined?`<div class="results-score-chip"><div class="results-score-chip-label">Exam Q</div><div class="results-score-chip-val">${Math.round(s.apply)}%</div></div>`:''}
          </div>
        </div>`;
      }).join('');
  const weakHtml=wa.length?`<div class="section-label">Weak areas</div>
    <div class="weak-wrap">${wa.map(p=>`<span class="weak-tag">⚠ ${p.title}</span>`).join('')}</div>`:'';
  const hasSaves=scored.length>0;
  return `${hdr('Your Progress','Session & saved results',false)}
    <div class="content">
      <div class="section-label">PAG mastery</div>
      ${cardsHtml}
      ${weakHtml}
      ${hasSaves?`<div class="settings-card">
        <div class="settings-title">Progress settings</div>
        <div style="font-size:13px;color:var(--text2);margin-bottom:10px;line-height:1.5;">Your progress is saved on this device. To start fresh, tap below.</div>
        <button class="reset-btn" data-action="resetProgress">Reset all progress</button>
      </div>`:''}
    </div>${nav()}`;
}

// ── SHARED UI ────────────────────────────
function hdr(title,sub,showBack){
  return `<div class="header"><div class="header-top">
    ${showBack?`<button class="back-btn" data-action="goBack">‹</button>`:''}
    <div class="header-text">
      <div class="header-title">${title}</div>
      ${sub?`<div class="header-sub">${sub}</div>`:''}
    </div>
    <span class="header-badge">A Level</span>
  </div></div>`;
}

function nav(){
  return `<div class="bottom-nav">
    <button class="nav-tab ${S.tab==='pags'?'active':''}" data-action="setTab" data-tab="pags"><span class="nav-icon">⚗️</span><span>PAGs</span></button>
    <button class="nav-tab ${S.tab==='results'?'active':''}" data-action="setTab" data-tab="results"><span class="nav-icon">📊</span><span>Results</span></button>
  </div>`;
}

// ═══════════════════════════════════════════
//  EVENTS
// ═══════════════════════════════════════════
function attach(){
  document.querySelectorAll('[data-action]').forEach(el=>el.addEventListener('click',handleClick));
  const ta=document.getElementById('applyTA');
  if(ta){
    ta.addEventListener('input',()=>{
      S.applyAnswer=ta.value;
      const cc=document.getElementById('charCount');
      if(cc) cc.textContent=ta.value.length+' characters';
    });
  }
  const ita=document.getElementById('improveTA');
  if(ita){
    ita.addEventListener('input',()=>{ S.improveText=ita.value; });
  }
}

function handleClick(e){
  const el=e.currentTarget,a=el.dataset.action;
  if(a==='openPag'){
    S.selectedPag=el.dataset.id; S.view='detail'; S.tab='pags';
    S.openSections={}; S.openTerms={}; S.selectedPractical=0; render();
  }
  else if(a==='goBack'){
    if(S.view==='detail') S.view='list';
    else if(S.view==='practice') S.view='detail';
    else if(S.view==='sentence') S.view='detail';
    else if(S.view==='apply'){ S.view='detail'; S.applyScore=null; S.applyAnswer=''; S.selectedQuestion=null; S.adaptiveQuestion=null; S.coachSteps=null; S.improveText=''; }
    render();
  }
  else if(a==='toggleSec'){
    const icon=el.querySelector('.collapsible-icon');
    const currently=icon&&icon.classList.contains('open');
    S.openSections[el.dataset.sid]=!currently; render();
  }
  else if(a==='toggleTerm'){
    const k=decodeURIComponent(el.dataset.term); S.openTerms[k]=!S.openTerms[k]; render();
  }
  else if(a==='setPractical'){
    S.selectedPractical=parseInt(el.dataset.idx); render();
  }
  else if(a==='startPractice'){
    S.view='practice'; S.fcDone=false; S.fc={index:0,revealed:false,scores:{}}; render();
  }
  else if(a==='retryPractice'){
    S.fcDone=false; S.fc={index:0,revealed:false,scores:{}}; render();
  }
  else if(a==='startSentence'){
    const cards=SB_DATA[S.selectedPag]||[];
    if(!cards.length) return;
    S.view='sentence'; S.sbDone=false;
    S.sb={
      index:0,
      selected:new Array(cards[0].blanks.length).fill(null),
      answered:false,scores:{},
      shuffledOptions:cards.map(c=>buildShuffledOptions(c))
    };
    render();
  }
  else if(a==='retrySentence'){
    const cards=SB_DATA[S.selectedPag]||[];
    S.sbDone=false;
    S.sb={
      index:0,
      selected:new Array(cards[0].blanks.length).fill(null),
      answered:false,scores:{},
      shuffledOptions:cards.map(c=>buildShuffledOptions(c))
    };
    render();
  }
  else if(a==='sbSelect'){
    const blankIdx=parseInt(el.dataset.blank);
    const opt=el.dataset.opt;
    if(!S.sb.selected) S.sb.selected=[];
    S.sb.selected[blankIdx]=opt;
    const cards=SB_DATA[S.selectedPag];
    const card=cards[S.sb.index];
    const allFilled=card.blanks.every((_,i)=>S.sb.selected[i]);
    if(allFilled) S.sb.answered=true;
    render();
  }
  else if(a==='sbNext'){
    const cards=SB_DATA[S.selectedPag];
    const card=cards[S.sb.index];
    const correct=card.blanks.every((b,i)=>S.sb.selected[i]&&S.sb.selected[i].toLowerCase()===b.toLowerCase());
    S.sb.scores[S.sb.index]=correct;
    if(S.sb.index+1<cards.length){
      const nextCard=cards[S.sb.index+1];
      S.sb.index++;
      S.sb.selected=new Array(nextCard.blanks.length).fill(null);
      S.sb.answered=false;
      render();
    } else {
      const cnt=Object.values(S.sb.scores).filter(Boolean).length;
      const pct=Math.round((cnt/cards.length)*100);
      updateScore(S.selectedPag,'sb',pct);
      S.sbDone=true; render();
    }
  }
  else if(a==='selectQuestion'){
    S.selectedQuestion=el.dataset.qid; S.applyAnswer=''; S.applyScore=null; render();
  }
  else if(a==='startApply'){ S.view='apply'; S.applyScore=null; S.applyAnswer=''; S.selectedQuestion=null; S.adaptiveQuestion=null; render(); }
  else if(a==='submitImprovement'){
    const ta=document.getElementById('improveTA');
    const addition=ta?ta.value:S.improveText;
    if(!addition.trim()){alert('Please write your addition before re-marking.');return;}
    const combined=improveAnswer(S.applyAnswer, addition);
    const pag=DATA.pags.find(p=>p.id===S.selectedPag);
    let result;
    if(S.adaptiveQuestion) {
      result = markAnswerByType(combined, pag, S.adaptiveQuestion.type, S.adaptiveQuestion.marks);
    } else {
      result = markAnswer(combined, pag, S.selectedQuestion);
    }
    const pct=Math.round((result.score/result.max_score)*100);
    updateScore(S.selectedPag,'apply',pct);
    updateCriterionProgress(S.selectedPag, result.breakdown);
    const qType = S.adaptiveQuestion ? S.adaptiveQuestion.type : (pag.questions.find(q=>q.id===S.selectedQuestion)||{}).type;
    S.coachSteps = generateSixMarkCoach(result, qType || 'evaluation');
    S.improveText = addition;
    S.applyAnswer = combined;
    S.applyScore = result;
    render();
  }
  else if(a==='newAdaptiveQuestion'){
    // Generate a fresh adaptive question (different context variant)
    S.applyScore=null; S.applyAnswer=''; S.adaptiveQuestion=null; S.selectedQuestion=null;
    render();
  }
  else if(a==='revealCard'){ if(!S.fc.revealed){S.fc.revealed=true;render();} }
  else if(a==='fcGot'){ advanceCard(true); }
  else if(a==='fcNope'){ advanceCard(false); }
  else if(a==='submitAnswer'){
    const ta=document.getElementById('applyTA');
    const ans=ta?ta.value:S.applyAnswer;
    if(!ans.trim()){alert('Please write your answer before submitting.');return;}
    const pag=DATA.pags.find(p=>p.id===S.selectedPag);
    // Step 5: Route to correct mark scheme — pass type directly for adaptive questions
    let result;
    if(S.adaptiveQuestion) {
      result = markAnswerByType(ans, pag, S.adaptiveQuestion.type, S.adaptiveQuestion.marks);
    } else {
      result = markAnswer(ans, pag, S.selectedQuestion);
    }
    const pct=Math.round((result.score/result.max_score)*100);
    // Step 1: Store coarse score AND per-criterion breakdown for adaptive targeting
    updateScore(S.selectedPag,'apply',pct);
    updateCriterionProgress(S.selectedPag, result.breakdown);
    // Generate six-mark coaching steps from breakdown
    const qType = S.adaptiveQuestion ? S.adaptiveQuestion.type : (pag.questions.find(q=>q.id===S.selectedQuestion)||{}).type;
    S.coachSteps = result.marks >= 4 || result.max_score >= 4
      ? generateSixMarkCoach(result, qType || 'evaluation')
      : null;
    S.improveText = '';
    S.applyAnswer=ans; S.applyScore=result; render();
  }
  else if(a==='tryAgain'){S.applyScore=null;S.applyAnswer='';S.adaptiveQuestion=null;S.selectedQuestion=null;S.coachSteps=null;S.improveText='';render();}
  else if(a==='setTab'){
    S.tab=el.dataset.tab;
    S.view=el.dataset.tab==='results'?'results':'list';
    render();
  }
  else if(a==='resetProgress'){
    if(confirm('Reset all saved progress? This cannot be undone.')){
      clearProgress(); S.sessionScores={}; render();
    }
  }
}

function advanceCard(got){
  const pag=DATA.pags.find(p=>p.id===S.selectedPag);
  S.fc.scores[S.fc.index]=got;
  if(S.fc.index+1<pag.flashcards.length){
    S.fc.index++; S.fc.revealed=false; render();
  } else {
    const correct=Object.values(S.fc.scores).filter(Boolean).length;
    const pct=Math.round((correct/pag.flashcards.length)*100);
    updateScore(S.selectedPag,'fc',pct);
    S.fcDone=true; render();
  }
}

render();
</script>
